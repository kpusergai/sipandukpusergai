<script>
  let cacheDataGrid = [];
  let gridCurrentPage = 1;
  let gridPerPageLimit = 10;
  let gridTotalPages = 1;

  // 1. ENGINE PERTAHANAN SESI LOGIN (ANTI-REFRESH)
  document.addEventListener("DOMContentLoaded", function() {
    const statusLogin = localStorage.getItem("kpu_session_active");
    const namaPetugas = localStorage.getItem("kpu_session_user");
    
    if (statusLogin === "TRUE" && namaPetugas) {
      document.getElementById("screenLogin").classList.add("hidden");
      const screenUtama = document.getElementById("screenAplikasiUtama");
      if (screenUtama) {
        screenUtama.classList.remove("hidden");
        screenUtama.style.setProperty("display", "flex", "important");
      }
      const footerAside = document.querySelector(".aside-footer");
      if (footerAside) footerAside.innerHTML = `Petugas: <b>${namaPetugas}</b><br>v1.0 &copy; 2026 KPU`;
      
      pemicuMuatDataPascaLogin();
    }
  });

  // 2. OTENTIKASI LOGIN PETUGAS (ANTI-CRASH LOGOUT)
    function handleLoginPetugas(e) {
    e.preventDefault();
    const btn = document.getElementById("btnLoginSubmit");
    const user = document.getElementById("login_username").value;
    const pass = document.getElementById("login_password").value;
    
    if (!btn) return;
    btn.disabled = true; btn.innerText = "Memverifikasi...";
    
    google.script.run
      .withSuccessHandler(function(res) {
        btn.disabled = false; btn.innerText = "Masuk Aplikasi";
        if (res && res.status === "SUCCESS") {
          localStorage.setItem("kpu_session_active", "TRUE");
          localStorage.setItem("kpu_session_user", res.user.namaPetugas);

          document.getElementById("screenLogin").classList.add("hidden");
          const screenUtama = document.getElementById("screenAplikasiUtama");
          if (screenUtama) {
            screenUtama.classList.remove("hidden");
            screenUtama.style.setProperty("display", "flex", "important");
          }

          // NOTIFIKASI SUKSES TAMPILAN KEREN
          tampilNotifikasiKpu("Login Berhasil! Selamat datang kembali.", "success");
          
          const footerAside = document.querySelector(".aside-footer");
          if (footerAside) footerAside.innerHTML = `Petugas: <b>${res.user.namaPetugas}</b><br>v1.0 &copy; 2026 KPU`;
          
          pemicuMuatDataPascaLogin();
        } else {
          // NOTIFIKASI GAGAL TAMPILAN KEREN
          tampilNotifikasiKpu(res.message || "Username atau Password salah!", "error");
        }
      })
      .withFailureHandler(function(err) {
        btn.disabled = false; btn.innerText = "Masuk Aplikasi";
        tampilNotifikasiKpu("Gangguan jaringan: " + err.toString(), "error");
      })
      .cekLoginPetugas(user, pass);
  }


  // 3. PEMUAT DATA BACKGROUND DROPDOWN & NOMOR TERAKHIR (ANTI-WAITING)
  function pemicuMuatDataPascaLogin() {
    google.script.run.withSuccessHandler(function(data) {
      if (!data) return;
      ["pegawai1", "pegawai2", "pegawai3", "pegawai4", "pegawai5"].forEach(id => {
        const el = document.getElementById(id);
        if (el) {
          el.innerHTML = '<option value="">-- Pilih Pegawai --</option>';
          data.forEach(nama => { 
            const opt = document.createElement("option"); opt.value = nama; opt.textContent = nama; el.appendChild(opt); 
          });
        }
      });
    }).getDaftarPegawai();

    google.script.run.withSuccessHandler(function(teksGabungan) {
      const elBoxKetua = document.getElementById("info_box_ketua");
      const elBoxSekre = document.getElementById("info_box_sekre");
      const elBoxSpd = document.getElementById("info_box_spd");
      
      if (!teksGabungan || teksGabungan.indexOf("#") === -1) {
        if (elBoxKetua) elBoxKetua.innerText = "No Terakhir: -";
        if (elBoxSekre) elBoxSekre.innerText = "No Terakhir: -";
        if (elBoxSpd) elBoxSpd.innerText = "No Terakhir: -";
        return;
      }
      
      const dataPecah = teksGabungan.split("#");
      if (elBoxKetua) elBoxKetua.innerText = "No Terakhir: " + (dataPecah[0] || "-");
      if (elBoxSekre) elBoxSekre.innerText = "No Terakhir: " + (dataPecah[1] || "-");
      if (elBoxSpd) elBoxSpd.innerText = "No Terakhir: " + (dataPecah[2] || "-");
    }).getNomorTerakhirDokumen();
  }
  // 4. LOGIKA KALKULASI OTOMATIS DURASI HARI DINAS
  function hitungHari() {
    const t1 = document.getElementById("tgl_berangkat").value; 
    const t2 = document.getElementById("tgl_kembali").value;
    const display = document.getElementById("jlh_hari"); 
    if (!display) return;
    if (t1 && t2) {
      const d1 = new Date(t1); const d2 = new Date(t2);
      if (d2 < d1) { 
        alert("Tanggal kembali tidak boleh mendahului tanggal berangkat."); 
        document.getElementById("tgl_kembali").value = ""; display.value = 0; return; 
      }
      display.value = (Math.ceil((d2 - d1) / (1000 * 3600 * 24)) + 1) + " Hari";
    } else { display.value = 0; }
  }

    // ====================================================================
    // 5. HANDLER SUBMIT DATA SURAT BARU DAN UPDATE SURAT (NOTIFIKASI KEREN)
    // ====================================================================
    function handleFormSubmit(e) {
    e.preventDefault();
    const btn = document.getElementById("btnSubmit"); 
    const noSuratLama = document.getElementById("no_surat_lama").value;
    if (!document.getElementById("no_surat_ketua").value && !document.getElementById("no_surat_sekre").value) { 
      tampilNotifikasiKpu("Mohon isi minimal salah satu Nomor Surat Tugas!", "error"); return; 
    }
    if (btn) { btn.disabled = true; btn.innerText = "Memproses..."; }
    
    const formDataObj = {}; 
    new FormData(document.getElementById("formSpd")).forEach((val, key) => { formDataObj[key] = val; });
    
    // AMBIL NAMA PETUGAS OPERATOR YANG AKTIF DARI MEMORI BROWSER
    const petugasAktif = localStorage.getItem("kpu_session_user") || "System";
    formDataObj["user_aktif"] = petugasAktif; // Suntikkan ke data pengiriman

    if (noSuratLama) {
      google.script.run.withSuccessHandler(function(res) {
        if (btn) { btn.disabled = false; btn.innerText = "Perbarui Data"; }
        if (res && res.status === "SUCCESS") { tampilNotifikasiKpu(res.message, "success"); batalkanModeEdit(); } 
        else { tampilNotifikasiKpu(res ? res.message : "Terjadi kesalahan", "error"); }
      }).updateDataSurat(noSuratLama, formDataObj);
    } else {
      google.script.run.withSuccessHandler(function(res) {
        if (btn) { btn.disabled = false; btn.innerText = "Simpan Surat"; }
        if (res && res.status === "SUCCESS") { 
          tampilNotifikasiKpu(res.message, "success"); 
          document.getElementById("formSpd").reset(); 
          document.getElementById("jlh_hari").value = 0; 
          pemicuMuatDataPascaLogin(); 
        } else { tampilNotifikasiKpu(res ? res.message : "Terjadi kesalahan", "error"); }
      }).simpanDataSurat(formDataObj);
    }
  }

  // 6. SISTEM PERPINDAHAN LAYER LAYOUT UTAMA (NAVIGASI)
  function bukaHalaman(jenis) {
    const hInput = document.getElementById("halamanInput"); 
    const hGrid = document.getElementById("halamanGrid"); 
    const hCetak = document.getElementById("halamanCetak");
    const mInput = document.getElementById("menu-input"); 
    const mGrid = document.getElementById("menu-grid"); 
    const mCetak = document.getElementById("menu-cetak");
    if (hInput) hInput.classList.add("hidden"); 
    if (hGrid) hGrid.classList.add("hidden"); 
    if (hCetak) hCetak.classList.add("hidden");
    if (mInput) mInput.classList.remove("nav-active"); 
    if (mGrid) mGrid.classList.remove("nav-active"); 
    if (mCetak) mCetak.classList.remove("nav-active");
    if (jenis === 'input' && hInput && mInput) { hInput.classList.remove("hidden"); mInput.classList.add("nav-active"); } 
    else if (jenis === 'grid' && hGrid && mGrid) { hGrid.classList.remove("hidden"); mGrid.classList.add("nav-active"); muatGrid(); } 
    else if (jenis === 'cetak' && hCetak && mCetak) { hCetak.classList.remove("hidden"); mCetak.classList.add("nav-active"); muatDropdownCetak(); }
  }

  function pemicuResetPaginationGrid() { gridCurrentPage = 1; muatGrid(); }
  // 7. SINKRONISASI PENGAMBILAN DATA UTAMA GRID PRATINJAU
  function muatGrid() {
    const tbody = document.getElementById("bodyTabelGrid"); if (!tbody) return;
    const stKetuaCari = document.getElementById("filterStKetuaInput") ? document.getElementById("filterStKetuaInput").value : "";
    const stSekreCari = document.getElementById("filterStSekreInput") ? document.getElementById("filterStSekreInput").value : "";
    tbody.innerHTML = `<tr><td colspan="9" style="text-align:center; color:#2563eb; font-weight: bold; padding:16px;">🔄 Menyinkronkan seluruh nama pegawai berdasarkan nomor ST...</td></tr>`;
    google.script.run.withSuccessHandler(renderHasilDataGrid).withFailureHandler(function(err) { tbody.innerHTML = `<tr><td colspan="9" style="text-align:center; color:#ef4444; padding:16px;">⚠️ Gagal: ${err.toString()}</td></tr>`; }).getPratinjauInput(stKetuaCari, stSekreCari, gridCurrentPage, gridPerPageLimit);
  }

  // 8. RENDER DATA KE DALAM BODI TABEL STRUKTUR GRID
  function renderHasilDataGrid(response) {
    const tbody = document.getElementById("bodyTabelGrid"); if (!tbody) return; tbody.innerHTML = "";
    if (!response || !response.data || response.data.length === 0) { tbody.innerHTML = `<tr><td colspan="9" style="text-align:center; padding:16px; color:#9ca3af; font-style: italic;">Tidak ada data surat tugas yang cocok.</td></tr>`; sembunyikanKontrolGridPagination(); return; }
    gridTotalPages = response.totalPages;
    response.data.forEach((row, indeks) => {
      const tr = document.createElement("tr"); const nomorUrutAktif = ((gridCurrentPage - 1) * gridPerPageLimit) + (indeks + 1);
      tr.innerHTML = `<td style="text-align:center;"><button type="button" class="btn-edit" onclick="aktifkanModeEdit(${row.indeksAsli})">✏️ Edit</button></td><td style="text-align: center; font-weight: bold; background: #f8fafc;">${nomorUrutAktif}</td><td style="font-weight:bold; color:#1e3a8a; white-space: normal; min-width: 200px;">${row.gabunganPegawai}</td><td style="font-weight:bold; color:#10b981; font-family:monospace;">${row.noStKetua}</td><td style="font-weight:bold; color:#3b82f6; font-family:monospace;">${row.noStSekre}</td><td>${row.tujuan}</td><td>${row.tglBerangkat}</td><td>${row.tglKembali}</td><td style="text-align:center; font-weight:bold; color:#2563eb;">${row.jlhHari} Hari</td>`;
      tbody.appendChild(tr);
    });
    const limitBox = document.getElementById("grid-limit-container"); const limitPlace = document.getElementById("grid-limit-placeholder"); const navBtnBox = document.getElementById("grid-nav-buttons-container");
    if (!limitBox || !limitPlace || !navBtnBox) return;
    if (response.totalData > 10) { limitBox.style.display = "flex"; limitPlace.style.display = "none"; } else { limitBox.style.display = "none"; limitPlace.style.display = "block"; }
    if (response.totalData > 30) { navBtnBox.style.display = "flex"; document.getElementById("grid-page-info").innerText = `Halaman ${gridCurrentPage} dari ${gridTotalPages}`; document.getElementById("grid-btn-back").disabled = (gridCurrentPage === 1); document.getElementById("grid-btn-next").disabled = (gridCurrentPage === gridTotalPages); document.getElementById("grid-btn-last").disabled = (gridCurrentPage === gridTotalPages); } else { navBtnBox.style.display = "none"; }
  }

  function ubahLimitGrid(angkaLimit) { gridPerPageLimit = parseInt(angkaLimit); gridCurrentPage = 1; muatGrid(); }
  function navigasiGrid(tipeAksi) {
    if (tipeAksi === 'back' && gridCurrentPage > 1) { gridCurrentPage--; } else if (tipeAksi === 'next' && gridCurrentPage < gridTotalPages) { gridCurrentPage++; } else if (tipeAksi === 'last') { gridCurrentPage = gridTotalPages; }
    muatGrid();
  }
  function sembunyikanKontrolGridPagination() {
    const limitBox = document.getElementById("grid-limit-container"), limitPlace = document.getElementById("grid-limit-placeholder"), navBtnBox = document.getElementById("grid-nav-buttons-container");
    if (limitBox) limitBox.style.display = "none"; if (limitPlace) limitPlace.style.display = "block"; if (navBtnBox) navBtnBox.style.display = "none";
  }
  // 9. MODUL DROPDOWN PANEL CETAK & ACTION DOWNLOAD PDF
  function muatDropdownCetak() {
    const selKetua = document.getElementById("selectCetakStKetua"), selSekre = document.getElementById("selectCetakStSekre"), selSpd = document.getElementById("selectCetakSpd");
    if(selKetua) selKetua.innerHTML = "<option value=''>-- Memuat... --</option>"; if(selSekre) selSekre.innerHTML = "<option value=''>-- Memuat... --</option>"; if(selSpd) selSpd.innerHTML = "<option value=''>-- Memuat... --</option>";
    google.script.run.withSuccessHandler(function(res) {
      if (!res) return;
      if (selKetua) { if (res.stKetua && res.stKetua.length > 0) { selKetua.innerHTML = ""; res.stKetua.forEach(no => { let o = document.createElement("option"); o.value=no; o.textContent=no; selKetua.appendChild(o); }); } else { selKetua.innerHTML = "<option value=''>-- Tidak ada data ST Ketua --</option>"; } }
      if (selSekre) { if (res.stSekre && res.stSekre.length > 0) { selSekre.innerHTML = ""; res.stSekre.forEach(no => { let o = document.createElement("option"); o.value=no; o.textContent=no; selSekre.appendChild(o); }); } else { selSekre.innerHTML = "<option value=''>-- Tidak ada data ST Sekretaris --</option>"; } }
      if (selSpd) { if (res.spd && res.spd.length > 0) { selSpd.innerHTML = ""; res.spd.forEach(no => { let o = document.createElement("option"); o.value=no; o.textContent=no; selSpd.appendChild(o); }); } else { selSpd.innerHTML = "<option value=''>-- Tidak ada data SPD --</option>"; } }
    }).getListCetakDokumen();
  }

  function unduhDokumenPdf(jenis) {
    let noDipilih = ""; let btn = null;
    if (jenis === 'ST_KETUA') { noDipilih = document.getElementById("selectCetakStKetua").value; btn = document.getElementById("btnCetakStKetua"); } 
    else if (jenis === 'ST_SEKRE') { noDipilih = document.getElementById("selectCetakStSekre").value; btn = document.getElementById("btnCetakStSekre"); } 
    else if (jenis === 'SPD') { noDipilih = document.getElementById("selectCetakSpd").value; btn = document.getElementById("btnCetakSpd"); }
    if (!noDipilih || noDipilih.startsWith("--")) { alert("Silakan pilih nomor dokumen dinas terlebih dahulu."); return; }
    
    const loader = document.getElementById("loadingCetak"); if (btn) btn.disabled = true; if (loader) loader.style.display = "block";
    
    google.script.run.withSuccessHandler(function(res) {
      if (btn) btn.disabled = false; if (loader) loader.style.display = "none";
      
      if (res && res.status === "SUCCESS") {
        // =================================================================
        // SOLUSI TERBAIK: Mengubah URL Docs ke format ekspor pratinjau cetak
        // =================================================================
        // Mengubah ".../edit" menjadi ".../preview"
        // var printPreviewUrl = res.url.replace('/edit?usp=drivesdk', '/preview').replace('/edit', '/preview');
        var printPreviewUrl = res.url.replace('/edit?usp=drivesdk', '/export?format=pdf').replace('/edit', '/export?format=pdf');

        
        // Membuka tab baru. Browser akan mendeteksi dokumen pratinjau bersih
        var win = window.open(printPreviewUrl, "_blank"); 
        if (win) {
          win.focus();
        }
        // =================================================================
        
      } else { 
        alert(res ? res.message : "Terjadi kesalahan"); 
      }
    }).eksekusiCetakDokumen(jenis, noDipilih);
}


  // 10. ENGINE MODE EDIT KPU (MEMBACA LOG ANTRIAN BERDASARKAN INDEKS)
  function aktifkanModeEdit(indeks) {
    google.script.run.withSuccessHandler(function(fullDataGrid) {
      if (!fullDataGrid || !fullDataGrid[indeks]) { alert("Detail baris data antrian gagal diambil."); return; }
      const dataDipilih = fullDataGrid[indeks];
      document.getElementById("statusModeEdit").style.display = "block"; document.getElementById("judulForm").innerText = "Ubah Data Surat Perjalanan Dinas";
      document.getElementById("btnBatalEdit").classList.remove("hidden"); document.getElementById("btnResetForm").classList.add("hidden"); document.getElementById("btnSubmit").innerText = "Perbarui Data";
      document.getElementById("no_surat_lama").value = dataDipilih.noSurat; document.getElementById("no_surat_ketua").value = dataDipilih.noSuratKetua || ""; document.getElementById("tgl_surat_ketua").value = dataDipilih.tglSuratKetua || ""; document.getElementById("no_surat_sekre").value = dataDipilih.noSuratSekre || ""; document.getElementById("tgl_surat_sekre").value = dataDipilih.tglSuratSekre || "";
      document.getElementById("pegawai1").value = dataDipilih.pegawai1; document.getElementById("pegawai2").value = dataDipilih.pegawai2 || ""; document.getElementById("pegawai3").value = dataDipilih.pegawai3 || ""; document.getElementById("pegawai4").value = dataDipilih.pegawai4 || ""; document.getElementById("pegawai5").value = dataDipilih.pegawai5 || "";
      document.getElementById("tugas").value = dataDipilih.tugas; document.getElementById("tujuan").value = dataDipilih.tujuan; document.getElementById("tgl_berangkat").value = dataDipilih.tglBerangkat; document.getElementById("tgl_kembali").value = dataDipilih.tglKembali; document.getElementById("kendaraan").value = dataDipilih.kendaraan; document.getElementById("jlh_hari").value = dataDipilih.jlhHari + " Hari";
      document.getElementById("spd1").value = dataDipilih.spd1; document.getElementById("spd2").value = dataDipilih.spd2 || ""; document.getElementById("spd3").value = dataDipilih.spd3 || ""; document.getElementById("spd4").value = dataDipilih.spd4 || ""; document.getElementById("spd5").value = dataDipilih.spd5 || "";
      bukaHalaman('input');
    }).getDataSuratGrid();
  }

  function batalkanModeEdit() {
    document.getElementById("statusModeEdit").style.display = "none"; document.getElementById("judulForm").innerText = "Formulir Input Surat Tugas & SPD";
    document.getElementById("btnBatalEdit").classList.add("hidden"); document.getElementById("btnResetForm").classList.remove("hidden"); document.getElementById("btnSubmit").innerText = "Simpan Surat";
    document.getElementById("formSpd").reset(); document.getElementById("no_surat_lama").value = ""; document.getElementById("jlh_hari").value = 0;
    bukaHalaman('grid');
  }

  // 11. ENGINE LOGOUT KEAMANAN PETUGAS OPERATOR (MEMBERSIHKAN LOCALSTORAGE)
    // 4. ENGINE LOGOUT KPU MODERN (MEMANGGIL MODAL KUSTOM)
  function aktifkanLogoutPetugas() {
    const modal = document.getElementById("kpuLogoutModal");
    if (modal) modal.classList.add("show");
  }

  function tutupModalLogout() {
    const modal = document.getElementById("kpuLogoutModal");
    if (modal) modal.classList.remove("show");
  }

  function eksekusiLogoutPetugas() {
    tutupModalLogout();
    
    // Hapus sesi lokal pertahanan user
    localStorage.removeItem("kpu_session_active");
    localStorage.removeItem("kpu_session_user");
    
    // Kosongkan form login
    document.getElementById("login_username").value = ""; 
    document.getElementById("login_password").value = "";
    
    // Sembunyikan dashboard sistem utama
    const screenUtama = document.getElementById("screenAplikasiUtama"); 
    if (screenUtama) { 
      screenUtama.classList.add("hidden"); 
      screenUtama.style.setProperty("display", "none", "important"); 
    }
    
    // Munculkan kembali layar login
    const screenLogin = document.getElementById("screenLogin"); 
    if (screenLogin) screenLogin.classList.remove("hidden");
    
    // Notifikasi sukses logout meluncur dari atas
    tampilNotifikasiKpu("Sesi diakhiri. Berhasil keluar.", "success");
  }

  // ENGINE NOTIFIKASI MODERN KUSTOM KPU
  function tampilNotifikasiKpu(pesan, tipe = "success") {
    const toast = document.getElementById("kpuToast");
    if (!toast) return;
  
    const ikon = tipe === "success" ? "✅" : "❌";
    toast.className = `kpu-toast kpu-toast-${tipe}`;
    toast.innerHTML = `<span class="kpu-toast-icon">${ikon}</span> <span>${pesan}</span>`;
  
    toast.classList.add("show");
    setTimeout(() => { toast.classList.remove("show"); }, 3000);
  }

</script>
